<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUGE · Control Entregas EDLP — Mateu Sports</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --rojo:        #D32F2F;
      --rojo-dark:   #9A0007;
      --dorado:      #B8A660;
      --dorado-lt:   #D4C070;
      --blanco:      #F5F0E8;
      --negro:       #0D0D0D;
      --gris-dark:   #1A1A1A;
      --gris-mid:    #242424;
      --gris-card:   #1E1E1E;
      --gris-line:   #333030;
      --dim:         rgba(245,240,232,0.55);
      --dim2:        rgba(245,240,232,0.32);
      --verde:       #4CAF50;
      --amber:       #E0A82E;
      --sobre:       #4FC3E8;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      color:var(--blanco); font-family:'Barlow',sans-serif; font-size:13px; min-height:100vh;
      background:
        radial-gradient(ellipse 70% 50% at 50% -5%, rgba(211,47,47,.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(184,166,96,.05) 0%, transparent 60%),
        var(--negro);
      background-attachment:fixed;
    }
    button { cursor:pointer; font-family:inherit; }

    /* ── NAV ── */
    .nav {
      position:sticky; top:0; z-index:100;
      background:linear-gradient(to bottom, rgba(13,13,13,.99), rgba(13,13,13,.95));
      border-bottom:1px solid rgba(184,166,96,.2);
      padding:16px 32px 14px;
      display:flex; flex-direction:column; align-items:center; gap:9px;
    }
    .nav-logos { display:flex; align-items:center; justify-content:center; gap:22px; }
    .nav-logos img { height:34px; object-fit:contain; }
    .nav-logos .ruge  { height:40px; }
    .nav-logos .mateu { filter:brightness(0) invert(1); }
    .nav-logos .edlp  { height:42px; }
    .nav-sep { width:1px; height:30px; background:rgba(184,166,96,.4); }
    .nav-title {
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px; letter-spacing:4px; text-transform:uppercase;
      color:var(--dim);
    }
    .nav-title b { color:var(--dorado); font-weight:700; }

    /* ── TOOLBAR ── */
    .toolbar {
      background:var(--gris-dark);
      border-bottom:1px solid var(--gris-line);
      padding:10px 32px;
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    }
    #fileInput { display:none; }
    .btn, .upload-lbl {
      font-family:'Barlow Condensed',sans-serif;
      font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
      padding:7px 16px;
      border:1px solid rgba(184,166,96,.3);
      background:transparent; color:var(--blanco);
      transition:all .15s;
    }
    .btn:hover, .upload-lbl:hover { background:rgba(184,166,96,.1); border-color:var(--dorado); }
    .btn-primary { background:var(--rojo); border-color:var(--rojo); color:#fff; }
    .btn-primary:hover { background:var(--rojo-dark); border-color:var(--rojo-dark); }
    .btn-ghost { border-color:transparent; color:var(--dim); }
    .btn-ghost:hover { border-color:var(--gris-line); color:var(--blanco); background:transparent; }
    .upstatus { font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--dim); letter-spacing:.5px; }
    .upstatus.ok  { color:var(--verde); }
    .upstatus.err { color:var(--rojo); }
    .tsep { width:1px; height:24px; background:var(--gris-line); }
    .filters { display:flex; align-items:center; gap:8px; flex:1; flex-wrap:wrap; }
    .f-lbl { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:1.5px; color:var(--dim2); text-transform:uppercase; }
    select, input[type=text] {
      background:var(--gris-mid); color:var(--blanco);
      border:1px solid var(--gris-line);
      padding:5px 9px;
      font-family:'Barlow Condensed',sans-serif; font-size:12px;
      outline:none; min-width:120px;
    }
    select:focus, input:focus { border-color:var(--dorado); }
    select option { background:var(--gris-mid); }

    /* ── MAIN ── */
    .main { max-width:1180px; margin:0 auto; padding:24px 32px 60px; }

    .cfg-notice {
      background:rgba(211,47,47,0.1); border:1px solid rgba(211,47,47,.35);
      padding:12px 18px; margin-bottom:20px;
      font-family:'Barlow Condensed',sans-serif; font-size:13px; color:var(--dim);
      letter-spacing:.3px; display:none;
    }
    .cfg-notice.on { display:block; }
    .cfg-notice b { color:var(--rojo); }
    .cfg-notice code { background:rgba(245,240,232,.08); padding:1px 5px; font-size:12px; color:var(--dorado-lt); }

    .empty { text-align:center; padding:100px 20px; color:var(--dim); }
    .empty .ic { font-size:46px; opacity:.2; }
    .empty h2 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:1px; margin:14px 0 8px; color:var(--blanco); }
    .empty p { font-size:14px; line-height:1.6; }

    /* ── KPI ── */
    .kpi-grid {
      display:grid; grid-template-columns:repeat(4, 1fr);
      gap:1px; background:rgba(184,166,96,.12);
      border:1px solid rgba(184,166,96,.15); margin-bottom:28px;
    }
    .kpi { background:var(--gris-card); padding:18px 22px; position:relative; }
    .kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--rojo); }
    .kpi.gold::before { background:var(--dorado); }
    .kpi-lbl { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; color:var(--dim2); text-transform:uppercase; margin-bottom:6px; }
    .kpi-val { font-family:'Bebas Neue',sans-serif; font-size:42px; line-height:.9; color:var(--blanco); }
    .kpi-sub { font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--dim); margin-top:3px; letter-spacing:.5px; }
    .c-green { color:var(--verde) !important; }
    .c-red   { color:var(--rojo-light, #ff6659) !important; }
    .c-amber { color:var(--amber) !important; }
    .c-sobre { color:var(--sobre) !important; }

    /* ── VALIDATION ── */
    .val-panel { background:var(--gris-card); border:1px solid rgba(184,166,96,.25); padding:20px 24px; margin-bottom:24px; display:none; }
    .val-panel.on { display:block; }
    .val-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; margin-bottom:14px; color:var(--dorado); }
    .val-grid { font-family:'Barlow Condensed',sans-serif; font-size:13px; }
    .val-row { display:flex; padding:6px 0; border-bottom:1px solid var(--gris-line); align-items:center; }
    .val-row:last-child { border-bottom:none; }
    .val-row.hdr { color:var(--dim2); font-weight:700; font-size:10px; letter-spacing:1px; text-transform:uppercase; }
    .vc { flex:1.4; }
    .vn { flex:1; text-align:right; font-weight:600; font-variant-numeric:tabular-nums; }
    .vk { width:26px; text-align:center; }
    .ok  { color:var(--verde); }
    .nok { color:var(--rojo); }
    .val-actions { display:flex; gap:12px; margin-top:18px; align-items:center; flex-wrap:wrap; }

    /* ── BREADCRUMB + BACK ── */
    .bc-row { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
    .back-btn {
      display:inline-flex; align-items:center; justify-content:center;
      width:34px; height:34px; flex-shrink:0;
      border:1px solid var(--gris-line); background:var(--gris-card);
      color:var(--dorado); font-size:20px; line-height:1;
      transition:all .15s;
    }
    .back-btn:hover { border-color:var(--dorado); background:rgba(184,166,96,.12); transform:translateX(-2px); }
    .back-btn:disabled { opacity:.25; cursor:default; transform:none; border-color:var(--gris-line); background:var(--gris-card); }
    .bc { display:flex; align-items:center; gap:8px; font-family:'Barlow Condensed',sans-serif; font-size:13px; letter-spacing:.5px; }
    .bc-item { color:var(--dorado); cursor:pointer; font-weight:600; transition:color .15s; }
    .bc-item:hover { color:var(--dorado-lt); }
    .bc-item.cur { color:var(--blanco); cursor:default; }
    .bc-sep { color:var(--gris-line); }

    /* ── BLOCK HEADER ── */
    .block-hdr { display:flex; align-items:center; gap:14px; margin:6px 0 16px; }
    .block-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; color:var(--dorado); white-space:nowrap; }
    .block-line { flex:1; height:1px; background:var(--gris-line); }
    .block-tot { font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--dim); letter-spacing:.5px; white-space:nowrap; }
    .block-tot b { color:var(--blanco); font-weight:600; }

    /* ── CARDS GRID ── */
    .cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:14px; margin-bottom:36px; }
    .card {
      background:var(--gris-card); border:1px solid var(--gris-line);
      padding:18px 20px 16px; cursor:pointer; position:relative;
      transition:border-color .2s, transform .15s, box-shadow .2s;
    }
    .card:hover { border-color:rgba(184,166,96,.5); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.4); }
    .card::before { content:''; position:absolute; top:0; left:0; width:3px; bottom:0; background:var(--rojo); opacity:.85; }
    .card.contrato::before { background:var(--dorado); }
    .card-name { font-family:'Bebas Neue',sans-serif; font-size:25px; letter-spacing:1px; color:var(--blanco); margin-bottom:3px; }
    .card-sub { font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--dim); margin-bottom:12px; letter-spacing:.5px; }
    .card-pills { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
    .pill { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:.5px; padding:2px 9px; border:1px solid var(--gris-line); color:var(--dim); text-transform:uppercase; }
    .card-stats { display:flex; gap:16px; margin-bottom:12px; }
    .cs { display:flex; flex-direction:column; gap:1px; }
    .cs-lbl { font-family:'Barlow Condensed',sans-serif; font-size:9px; letter-spacing:1px; color:var(--dim2); text-transform:uppercase; }
    .cs-val { font-family:'Bebas Neue',sans-serif; font-size:22px; line-height:1; color:var(--blanco); }
    .card-prog-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px; font-family:'Barlow Condensed',sans-serif; font-size:12px; }
    .card-prog-top .lbl { color:var(--dim); letter-spacing:.5px; }
    .card-prog-top .pct { font-weight:700; font-size:15px; }
    .card-prog-bar { height:5px; background:rgba(245,240,232,.08); overflow:hidden; }
    .card-prog-fill { height:100%; transition:width .4s; }
    .card-arrow { position:absolute; right:16px; top:18px; font-size:18px; color:var(--gris-line); transition:color .2s; }
    .card:hover .card-arrow { color:var(--dorado); }

    /* ── TOGGLE ── */
    .view-toggle { display:flex; align-items:center; gap:14px; margin-bottom:20px; flex-wrap:wrap; }
    .toggle { display:flex; border:1px solid var(--gris-line); }
    .tgl-btn {
      font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px;
      padding:6px 16px; background:transparent; color:var(--dim); border:none; text-transform:uppercase;
      transition:all .15s;
    }
    .tgl-btn.on { background:var(--rojo); color:#fff; }
    .tgl-btn:not(.on):hover { background:rgba(245,240,232,.05); color:var(--blanco); }

    /* ── TABLE ── */
    .table-wrap { overflow-x:auto; border:1px solid var(--gris-line); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead th {
      background:var(--gris-mid); color:var(--dorado);
      font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:10px; letter-spacing:1px; text-transform:uppercase;
      padding:10px 12px; text-align:right; white-space:nowrap;
      border-bottom:1px solid var(--gris-line);
    }
    thead th:first-child { text-align:left; }
    thead th.ct { text-align:center; }
    tbody td {
      padding:9px 12px; font-family:'Barlow Condensed',sans-serif; font-size:13px;
      text-align:right; white-space:nowrap; border-bottom:1px solid var(--gris-line);
      font-variant-numeric:tabular-nums;
    }
    tbody td:first-child { text-align:left; font-weight:500; max-width:300px; overflow:hidden; text-overflow:ellipsis; color:var(--blanco); }
    tbody td.ct { text-align:center; }
    tbody td.dim { color:var(--dim); font-size:11px; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:rgba(184,166,96,.05); }
    tfoot td {
      padding:10px 12px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
      text-align:right; border-top:2px solid rgba(184,166,96,.3); color:var(--blanco);
      font-variant-numeric:tabular-nums; background:var(--gris-dark);
    }
    tfoot td:first-child { text-align:left; color:var(--dorado); font-size:10px; letter-spacing:1px; text-transform:uppercase; }

    /* semaforo */
    .dot { display:inline-block; width:9px; height:9px; border-radius:50%; vertical-align:middle; }
    .dot.cumplido { background:var(--verde); box-shadow:0 0 6px rgba(76,175,80,.5); }
    .dot.sobre    { background:var(--sobre); box-shadow:0 0 6px rgba(79,195,232,.5); }
    .dot.pend-lo  { background:var(--amber); box-shadow:0 0 6px rgba(224,168,46,.5); }
    .dot.pend-hi  { background:var(--rojo); box-shadow:0 0 6px rgba(211,47,47,.5); }
    .pct-lbl { font-family:'Barlow Condensed',sans-serif; font-weight:700; }
    .pct-lbl.cumplido { color:var(--verde); }
    .pct-lbl.sobre    { color:var(--sobre); }
    .pct-lbl.pend-lo  { color:var(--amber); }
    .pct-lbl.pend-hi  { color:var(--rojo); }
    .sobre-val { color:var(--sobre); }
    .mini-prog { display:inline-block; width:54px; height:4px; background:rgba(245,240,232,.08); vertical-align:middle; margin-left:6px; }
    .mini-prog span { display:block; height:100%; }

    @media (max-width:760px) {
      .kpi-grid { grid-template-columns:repeat(2,1fr); }
      .nav-title { display:none; }
    }
  </style>
</head>

// PARSER — exacto según spec
// ═══════════════════════════════════════════════════════════════
function parseControlGeneral(workbook) {
  const sheet = workbook.Sheets['CONTROL GENERAL'];
  if (!sheet) throw new Error('No se encontró la hoja CONTROL GENERAL');
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

  const num = v => {
    if (v === null || v === undefined || v === '') return 0;
    const n = Number(v);
    return isNaN(n) ? 0 : n;
  };

  const articulos = [];
  for (let i = 4; i < rows.length; i++) {
    const r = rows[i];
    if (!r) continue;
    const articulo = r[0];
    if (!articulo || String(articulo).trim().toUpperCase() === 'TOTAL') continue;

    const canales = {};
    CANALES.forEach(c => {
      canales[c.id] = {
        pedido:  num(r[c.cols[0]]),
        entrega: num(r[c.cols[1]]),
        resta:   num(r[c.cols[2]]),
      };
    });

    articulos.push({
      articulo:     String(articulo).trim(),
      codigo:       r[1]  ? String(r[1]).trim() : '',
      color:        r[2]  ?? '',
      genero:       r[3]  ?? '',
      silueta:      r[4]  ?? '',
      origen:       r[5]  ?? '',
      proveedor:    r[6]  ?? '',
      linea:        r[7]  ?? '',
      totalGeneral: num(r[34]),
      canales,
    });
  }

  const totales = {};
  CANALES.forEach(c => {
    totales[c.id] = articulos.reduce((a, art) => {
      a.pedido  += art.canales[c.id].pedido;
      a.entrega += art.canales[c.id].entrega;
      a.resta   += art.canales[c.id].resta;
      return a;
    }, { pedido: 0, entrega: 0, resta: 0 });
  });
  const totalGlobal = Object.values(totales).reduce((a, t) => {
    a.pedido += t.pedido; a.entrega += t.entrega; a.resta += t.resta; return a;
  }, { pedido: 0, entrega: 0, resta: 0 });

  return {
    meta: { totalArticulos: articulos.length, generadoEn: new Date().toISOString() },
    canales: CANALES,
    articulos,
    totales,
    totalGlobal,
  };
}

function estadoEntrega(resta) {
  if (resta < 0)   return 'sobre-entrega';
  if (resta === 0) return 'cumplido';
  return 'pendiente';
}

let db = null;
const fbOk = FIREBASE_CONFIG.apiKey !== 'REEMPLAZAR_API_KEY';

if (fbOk) {
  try { firebase.initializeApp(FIREBASE_CONFIG); db = firebase.database(); }
  catch(e) { console.warn('Firebase init:', e.message); }
}

async function fbLoad() {
  if (!db) return;
  try {
    const snap = await db.ref('snapshot').once('value');
    const val = snap.val();
    if (val && val.articulos) { ST.data = val; render(); }
  } catch(e) { console.error('Firebase load:', e); }
}

async function fbSave(parsed) {
  if (!db) { setStatus('Firebase no configurado — datos no guardados', 'err'); return false; }
  try {
    await db.ref('snapshot').set(parsed);
    setStatus('✓ Sincronizado — ' + parsed.meta.totalArticulos + ' artículos', 'ok');
    return true;
  } catch(e) { setStatus('Error Firebase: ' + e.message, 'err'); return false; }
}

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const ST = {
  data:    null,
  pending: null,
  drill:   0,         // 0=canales  1=categorías  2=artículos
  canal:   null,
  cat:     null,
  catTipo: 'linea',   // 'linea' | 'silueta'
  filtros: { codigo:'' },
};

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
const fmt = n => new Intl.NumberFormat('es-AR').format(Math.round(n));

function pct(entrega, pedido) {
  if (pedido === 0) return entrega > 0 ? 100 : 100;
  return Math.round(entrega / pedido * 100);
}

function semaCls(resta, pedido) {
  if (resta < 0)   return 'sobre';
  if (resta === 0) return 'cumplido';
  const p = pct(pedido - resta, pedido);
  return p >= 80 ? 'pend-lo' : 'pend-hi';
}

function semaColor(cls) {
  return { cumplido:'var(--verde)', sobre:'var(--sobre)', 'pend-lo':'var(--amber)', 'pend-hi':'var(--rojo)' }[cls];
}

function restaCell(resta) {
  if (resta < 0) return '<span class="sobre-val">+' + fmt(Math.abs(resta)) + '</span>';
  return fmt(resta);
}

function pctCell(entrega, pedido, resta) {
  const p   = pct(entrega, pedido);
  const cls = semaCls(resta, pedido);
  const col = semaColor(cls);
  return '<span class="pct-lbl ' + cls + '">' + p + '%</span>'
    + '<span class="mini-prog"><span style="width:' + Math.min(100,p) + '%;background:' + col + '"></span></span>';
}

function setStatus(msg, type) {
  const el = document.getElementById('upStatus');
  el.textContent = msg;
  el.className = 'upstatus ' + (type || '');
}

function catLabel(tipo) { return tipo === 'linea' ? 'Línea' : 'Silueta'; }
function catOf(a, tipo) { return String(a[tipo] || '(sin clasificar)'); }

function getArts() {
  if (!ST.data) return [];
  let a = ST.data.articulos;
  const f = ST.filtros;
  if (f.codigo) {
    const q = f.codigo.toLowerCase();
    a = a.filter(x => x.codigo.toLowerCase().includes(q) || x.articulo.toLowerCase().includes(q));
  }
  return a;
}

function aggC(arts, cid) {
  return arts.reduce((a, x) => {
    const c = x.canales[cid];
    if (!c) return a;
    a.pedido += c.pedido; a.entrega += c.entrega; a.resta += c.resta;
    return a;
  }, { pedido:0, entrega:0, resta:0 });
}

function aggGlobal(arts) {
  return CANALES.reduce((a, c) => {
    const t = aggC(arts, c.id);
    a.pedido += t.pedido; a.entrega += t.entrega; a.resta += t.resta; return a;
  }, { pedido:0, entrega:0, resta:0 });
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  if (!ST.data) return;
  const arts = getArts();

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';

  const g   = aggGlobal(arts);
  const gCl = semaCls(g.resta, g.pedido);
  const gPc = pct(g.entrega, g.pedido);
  const pendCls = g.resta < 0 ? 'c-sobre' : g.resta === 0 ? 'c-green' : gCl === 'pend-lo' ? 'c-amber' : 'c-red';
  const cumpCls = gCl === 'cumplido' ? 'c-green' : gCl === 'sobre' ? 'c-sobre' : gCl === 'pend-lo' ? 'c-amber' : 'c-red';

  document.getElementById('kpiBar').innerHTML =
    kpiBox('Pedido',       fmt(g.pedido),  'unidades', false) +
    kpiBox('Entregado',    fmt(g.entrega), 'unidades', true) +
    kpiBox('Pendiente',    (g.resta < 0 ? '+' : '') + fmt(Math.abs(g.resta)),
           g.resta < 0 ? 'sobre-entrega' : 'a entregar', false, pendCls) +
    kpiBox('Cumplimiento', gPc + '%', arts.length + ' artículos', true, cumpCls);

  renderBC();
  fillSelects();

  if      (ST.drill === 0) renderCanales(arts);
  else if (ST.drill === 1) renderCategorias(arts);
  else                     renderArticulos(arts);
}

function kpiBox(lbl, val, sub, gold, cls) {
  return '<div class="kpi' + (gold ? ' gold' : '') + '">'
    + '<div class="kpi-lbl">' + lbl + '</div>'
    + '<div class="kpi-val' + (cls ? ' ' + cls : '') + '">' + val + '</div>'
    + '<div class="kpi-sub">' + sub + '</div></div>';
}

function renderBC() {
  let h = '<span class="bc-item' + (ST.drill===0?' cur':'') + '" onclick="navTo(0)">CANALES</span>';
  if (ST.drill >= 1 && ST.canal) {
    h += '<span class="bc-sep">/</span><span class="bc-item' + (ST.drill===1?' cur':'') + '" onclick="navTo(1)">' + ST.canal.nombre.toUpperCase() + '</span>';
  }
  if (ST.drill >= 2 && ST.cat) {
    h += '<span class="bc-sep">/</span><span class="bc-item cur">' + String(ST.cat).toUpperCase() + '</span>';
  }
  document.getElementById('bc').innerHTML = h;
  document.getElementById('backBtn').disabled = (ST.drill === 0);
}

function goBack() { if (ST.drill > 0) navTo(ST.drill - 1); }

function fillSelects() {
  document.getElementById('fCod').value = ST.filtros.codigo;
}

/* NIVEL 0 — canales como tarjetas: Contrato arriba, Mayorista abajo */
function renderCanales(arts) {
  let h = '';
  ['Contrato','Mayorista'].forEach(bloque => {
    const cs = CANALES.filter(c => c.bloque === bloque);
    let totB = { pedido:0, entrega:0, resta:0 };
    let cards = '';
    cs.forEach(c => {
      const t = aggC(arts, c.id);
      totB.pedido += t.pedido; totB.entrega += t.entrega; totB.resta += t.resta;
      // líneas presentes en este canal (con pedido o entrega)
      const lineas = [...new Set(arts
        .filter(a => (a.canales[c.id]?.pedido || a.canales[c.id]?.entrega))
        .map(a => catOf(a, 'linea')))];
      const pills = lineas.slice(0, 4).map(l => '<span class="pill">' + l + '</span>').join('');
      const cls = semaCls(t.resta, t.pedido);
      const p   = pct(t.entrega, t.pedido);
      const col = semaColor(cls);
      const pctTxt = (t.resta < 0)
        ? '<span class="pct-lbl sobre">+' + fmt(Math.abs(t.resta)) + ' extra</span>'
        : '<span class="pct-lbl ' + cls + '">' + p + '%</span>';
      cards += '<div class="card ' + (bloque==='Contrato'?'contrato':'') + '" onclick="drillCanal(\'' + c.id + '\')">'
        + '<div class="card-arrow">&#8250;</div>'
        + '<div class="card-name">' + c.nombre + '</div>'
        + '<div class="card-sub">' + bloque + (t.resta < 0 ? ' · sobre-entrega' : '') + '</div>'
        + (pills ? '<div class="card-pills">' + pills + '</div>' : '')
        + '<div class="card-stats">'
        +   '<div class="cs"><span class="cs-lbl">Pedido</span><span class="cs-val">' + fmt(t.pedido) + '</span></div>'
        +   '<div class="cs"><span class="cs-lbl">Entregado</span><span class="cs-val">' + fmt(t.entrega) + '</span></div>'
        +   '<div class="cs"><span class="cs-lbl">Pendiente</span><span class="cs-val">' + (t.resta < 0 ? '0' : fmt(t.resta)) + '</span></div>'
        + '</div>'
        + '<div class="card-prog-top"><span class="lbl">Cumplimiento</span>' + pctTxt + '</div>'
        + '<div class="card-prog-bar"><span class="card-prog-fill" style="width:' + Math.min(100,p) + '%;background:' + col + '"></span></div>'
        + '</div>';
    });
    h += '<div class="block-hdr"><span class="block-title">' + bloque.toUpperCase() + '</span>'
      + '<span class="block-line"></span>'
      + '<span class="block-tot">Pedido <b>' + fmt(totB.pedido) + '</b> · Entregado <b>' + fmt(totB.entrega) + '</b> · Pend. <b>' + (totB.resta<0?'+'+fmt(Math.abs(totB.resta)):fmt(totB.resta)) + '</b></span></div>'
      + '<div class="cards-grid">' + cards + '</div>';
  });
  document.getElementById('drillContent').innerHTML = h;
}

/* NIVEL 1 — categorías (línea/silueta) dentro del canal, como tarjetas */
function renderCategorias(arts) {
  const c = ST.canal;
  const tipo = ST.catTipo;

  // solo artículos con movimiento en este canal
  const inCanal = arts.filter(a => (a.canales[c.id]?.pedido || a.canales[c.id]?.entrega));

  const grupos = {};
  inCanal.forEach(a => {
    const k = catOf(a, tipo);
    if (!grupos[k]) grupos[k] = [];
    grupos[k].push(a);
  });
  const filas = Object.entries(grupos)
    .map(([k, items]) => ({ k, items, ...aggC(items, c.id) }))
    .sort((a,b) => b.pedido - a.pedido);
  const tot = aggC(inCanal, c.id);

  let cards = '';
  filas.forEach(f => {
    const cls = semaCls(f.resta, f.pedido);
    const p   = pct(f.entrega, f.pedido);
    const col = semaColor(cls);
    const pctTxt = (f.resta < 0)
      ? '<span class="pct-lbl sobre">+' + fmt(Math.abs(f.resta)) + ' extra</span>'
      : '<span class="pct-lbl ' + cls + '">' + p + '%</span>';
    cards += '<div class="card" onclick="drillCat(\'' + encodeURIComponent(f.k) + '\')">'
      + '<div class="card-arrow">&#8250;</div>'
      + '<div class="card-name">' + f.k + '</div>'
      + '<div class="card-sub">' + f.items.length + ' artículo' + (f.items.length===1?'':'s') + '</div>'
      + '<div class="card-stats">'
      +   '<div class="cs"><span class="cs-lbl">Pedido</span><span class="cs-val">' + fmt(f.pedido) + '</span></div>'
      +   '<div class="cs"><span class="cs-lbl">Entregado</span><span class="cs-val">' + fmt(f.entrega) + '</span></div>'
      +   '<div class="cs"><span class="cs-lbl">Pendiente</span><span class="cs-val">' + (f.resta < 0 ? '0' : fmt(f.resta)) + '</span></div>'
      + '</div>'
      + '<div class="card-prog-top"><span class="lbl">Cumplimiento</span>' + pctTxt + '</div>'
      + '<div class="card-prog-bar"><span class="card-prog-fill" style="width:' + Math.min(100,p) + '%;background:' + col + '"></span></div>'
      + '</div>';
  });

  document.getElementById('drillContent').innerHTML =
    viewToggle() +
    '<div class="block-hdr"><span class="block-title">' + c.nombre.toUpperCase() + ' · POR ' + catLabel(tipo).toUpperCase() + '</span>'
    + '<span class="block-line"></span>'
    + '<span class="block-tot">Pedido <b>' + fmt(tot.pedido) + '</b> · Entregado <b>' + fmt(tot.entrega) + '</b> · Pend. <b>' + (tot.resta<0?'+'+fmt(Math.abs(tot.resta)):fmt(tot.resta)) + '</b></span></div>'
    + '<div class="cards-grid">' + cards + '</div>';
}

/* NIVEL 2 — artículos de la categoría dentro del canal */
function renderArticulos(arts) {
  const c    = ST.canal;
  const tipo = ST.catTipo;
  const cat  = ST.cat;
  const items = arts
    .filter(a => catOf(a, tipo) === cat && (a.canales[c.id]?.pedido || a.canales[c.id]?.entrega))
    .sort((a,b) => (b.canales[c.id]?.pedido||0) - (a.canales[c.id]?.pedido||0));
  const tot = aggC(items, c.id);

  let rows = '';
  items.forEach(a => {
    const cv  = a.canales[c.id];
    const cls = semaCls(cv.resta, cv.pedido);
    rows += '<tr>'
      + '<td title="' + a.articulo + '">' + a.articulo + '</td>'
      + '<td class="dim">' + a.codigo + '</td>'
      + '<td>' + fmt(cv.pedido) + '</td>'
      + '<td>' + fmt(cv.entrega) + '</td>'
      + '<td>' + restaCell(cv.resta) + '</td>'
      + '<td>' + pctCell(cv.entrega, cv.pedido, cv.resta) + '</td>'
      + '<td class="ct"><span class="dot ' + cls + '"></span></td>'
      + '</tr>';
  });

  document.getElementById('drillContent').innerHTML =
    viewToggle() +
    '<div class="block-hdr"><span class="block-title">' + c.nombre.toUpperCase() + ' · ' + String(cat).toUpperCase() + '</span><span class="block-line"></span>'
    + '<span class="block-tot">' + items.length + ' artículos</span></div>'
    + '<div class="table-wrap"><table><thead><tr>'
    + '<th>Artículo</th><th>Código</th><th>Pedido</th><th>Entregado</th><th>Pendiente</th><th>% Cumpl.</th><th class="ct">Estado</th>'
    + '</tr></thead><tbody>' + rows + '</tbody>'
    + '<tfoot><tr><td>Total ' + String(cat).toUpperCase() + '</td><td></td>'
    + '<td>' + fmt(tot.pedido) + '</td><td>' + fmt(tot.entrega) + '</td>'
    + '<td>' + restaCell(tot.resta) + '</td><td>' + pctCell(tot.entrega, tot.pedido, tot.resta) + '</td><td></td></tr></tfoot></table></div>';
}

function viewToggle() {
  const t = ST.catTipo;
  return '<div class="view-toggle"><span class="f-lbl">Agrupar por</span>'
    + '<div class="toggle">'
    + '<button class="tgl-btn' + (t==='linea'?' on':'')   + '" onclick="setCatTipo(\'linea\')">Línea</button>'
    + '<button class="tgl-btn' + (t==='silueta'?' on':'') + '" onclick="setCatTipo(\'silueta\')">Silueta</button>'
    + '</div></div>';
}

// ═══════════════════════════════════════════════════════════════
// NAVEGACIÓN
// ═══════════════════════════════════════════════════════════════
function navTo(level) {
  ST.drill = level;
  if (level <= 0) { ST.canal = null; ST.cat = null; }
  if (level <= 1) { ST.cat = null; }
  render();
}
function drillCanal(id) { ST.canal = CANALES.find(c => c.id === id); ST.drill = 1; render(); }
function drillCat(enc)  { ST.cat = decodeURIComponent(enc); ST.drill = 2; render(); }
function setCatTipo(t)  { ST.catTipo = t; if (ST.drill === 2) ST.drill = 1; render(); }

// ═══════════════════════════════════════════════════════════════
// FILTROS
// ═══════════════════════════════════════════════════════════════
document.getElementById('fCod').addEventListener('input',  e => { ST.filtros.codigo = e.target.value; render(); });
function clearFilters() { ST.filtros = { codigo:'' }; render(); }

// ═══════════════════════════════════════════════════════════════
// UPLOAD / PARSE
// ═══════════════════════════════════════════════════════════════
document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  setStatus('Leyendo ' + file.name + '...');
  try {
    const buf    = await file.arrayBuffer();
    const wb     = XLSX.read(buf, { type: 'array' });
    const parsed = parseControlGeneral(wb);
    setStatus('Parseado: ' + parsed.meta.totalArticulos + ' artículos. Verificando...');
    ST.pending = parsed;
    showValidation(parsed);
  } catch(err) {
    setStatus('Error al parsear: ' + err.message, 'err');
  }
  e.target.value = '';
});

function showValidation(parsed) {
  const EXP = {
    totalGlobal:  { pedido:19676, entrega:17512, resta:2321  },
    tiendapincha: { pedido:7940,  entrega:6496,  resta:1444  },
    plantel:      { pedido:8395,  entrega:8228,  resta:184   },
    femenino:     { pedido:793,   entrega:846,   resta:-53   },
    reserva:      { pedido:1038,  entrega:894,   resta:144   },
    juvenil:      { pedido:1360,  entrega:898,   resta:602   },
    protocolo:    { pedido:150,   entrega:150,   resta:0     },
  };
  const chk = (g, e) => Math.abs(g - e) <= 1;
  const rows = [
    { lbl: 'TOTAL GLOBAL', got: parsed.totalGlobal, exp: EXP.totalGlobal },
    ...CANALES.map(c => ({ lbl: c.nombre, got: parsed.totales[c.id], exp: EXP[c.id] })),
  ];
  let allOk = true;
  let h = '<div class="val-title">Validación del snapshot</div><div class="val-grid">';
  h += '<div class="val-row hdr"><span class="vc">Canal</span><span class="vn">Pedido</span><span class="vn">Entrega</span><span class="vn">Resta</span><span class="vk"></span></div>';
  rows.forEach(r => {
    if (!r.exp) return;
    const ok = chk(r.got.pedido, r.exp.pedido) && chk(r.got.entrega, r.exp.entrega) && chk(r.got.resta, r.exp.resta);
    if (!ok) allOk = false;
    h += '<div class="val-row"><span class="vc">' + r.lbl + '</span>'
      + '<span class="vn ' + (chk(r.got.pedido, r.exp.pedido)  ?'ok':'nok') + '">' + fmt(r.got.pedido)  + '</span>'
      + '<span class="vn ' + (chk(r.got.entrega,r.exp.entrega) ?'ok':'nok') + '">' + fmt(r.got.entrega) + '</span>'
      + '<span class="vn ' + (chk(r.got.resta,  r.exp.resta)   ?'ok':'nok') + '">' + fmt(r.got.resta)   + '</span>'
      + '<span class="vk ' + (ok?'ok':'nok') + '">' + (ok?'✓':'✗') + '</span></div>';
  });
  h += '</div><div class="val-actions">';
  if (allOk) {
    h += '<span class="upstatus ok">✓ Todos los totales coinciden (' + parsed.meta.totalArticulos + ' arts.)</span>';
    h += '<button class="btn btn-primary" onclick="confirmUpload()">Sincronizar a Firebase</button>';
    h += '<button class="btn" onclick="previewOnly()">Solo vista previa</button>';
  } else {
    h += '<span class="upstatus err">✗ Algunos totales no coinciden con la referencia — revisá el Excel</span>';
    h += '<button class="btn btn-primary" onclick="confirmUpload()">Sincronizar igual</button>';
    h += '<button class="btn" onclick="previewOnly()">Solo vista previa</button>';
  }
  h += '<button class="btn btn-ghost" onclick="closeVal()">Cancelar</button></div>';

  const panel = document.getElementById('valPanel');
  panel.innerHTML = h; panel.classList.add('on');
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('appContent').style.display = 'block';
  document.getElementById('kpiBar').style.display = 'none';
}

async function confirmUpload() {
  if (!ST.pending) return;
  setStatus('Subiendo a Firebase...');
  const ok = await fbSave(ST.pending);
  // si Firebase falla igual mostramos local
  ST.data = ST.pending; ST.pending = null;
  closeVal();
  document.getElementById('kpiBar').style.display = '';
  if (!ok) setStatus('Datos locales cargados');
  render();
}

function previewOnly() {
  if (!ST.pending) return;
  ST.data = ST.pending; ST.pending = null;
  closeVal();
  document.getElementById('kpiBar').style.display = '';
  setStatus('Vista previa local (no sincronizado)');
  render();
}

function closeVal() {
  document.getElementById('valPanel').classList.remove('on');
  ST.pending = null;
  document.getElementById('kpiBar').style.display = '';
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
(async () => {
  // 1) Mostrar de entrada el snapshot embebido del Excel
  ST.data = DEFAULT_SNAPSHOT;
  render();
  if (!fbOk) setStatus('Datos locales cargados');
  // 2) Si Firebase está configurado, intentar traer un snapshot más nuevo
  //    (fbLoad sólo reemplaza si encuentra datos válidos)
  if (fbOk) { await fbLoad(); }
})();
</script>
